<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quieres ser mi San Valentín?</title>
    <style>
        :root {
            --bg: #ffe5ec;
            --card: #ffffff;
            --accent: #ff5a8a;
            --accent-dark: #e94a78;
            --text: #2b2b2b;
        }

        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background-image: url('https://media.istockphoto.com/id/1366924668/vector/dachshund-dogs-and-hearts-seamless-pattern-on-a-pink-background-valentines-day-vector.jpg?s=612x612&w=0&k=20&c=CaF3_3HgJT3nnfPtWz2PbkpHIOsePs45z47VqUThfd4=');
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        .scene {
            width: min(92vw, 520px);
            aspect-ratio: 4 / 3;
            background: var(--card);
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(255, 90, 138, 0.25);
            padding: clamp(20px, 4vw, 36px);
            position: relative;
            display: grid;
            gap: clamp(16px, 3vw, 24px);
            align-content: center;
            justify-items: center;
        }

        h1 {
            margin: 0;
            text-align: center;
            font-size: clamp(22px, 4.2vw, 32px);
        }

        .buttons {
            width: 100%;
            position: relative;
            height: clamp(120px, 25vw, 160px);
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 14px 18px;
            font-size: clamp(16px, 3.5vw, 18px);
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            touch-action: manipulation;
        }

        #yesBtn {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 10px 20px rgba(255, 90, 138, 0.3);
            position: absolute;
            left: 0;
            bottom: 0;
            width: 46%;
            height: clamp(52px, 8vw, 64px);
            --yes-scale: 1;
            transform: scale(var(--yes-scale));
            transform-origin: center;
        }

        #yesBtn:hover,
        #yesBtn.is-touched {
            transform: scale(calc(var(--yes-scale) + 0.12));
            background: var(--accent-dark);
        }

        #noBtn {
            background: #f2f2f2;
            color: #333;
            position: absolute;
            right: 0;
            bottom: 0;
            width: 46%;
            height: clamp(52px, 8vw, 64px);
        }

        .heart {
            font-size: clamp(36px, 8vw, 54px);
        }

        .hint {
            margin: 0;
            font-size: clamp(12px, 2.6vw, 14px);
            opacity: 0.75;
            text-align: center;
        }

        .popover {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            gap: 16px;
            background: rgba(255, 240, 245, 0.97);
            color: #c2185b;
            border-radius: 24px;
            font-weight: 700;
            font-size: clamp(18px, 4vw, 28px);
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.98);
            transition: opacity 0.2s ease, transform 0.2s ease;
            padding: clamp(18px, 4vw, 28px);
            z-index: 5;
        }

        .popover.show {
            opacity: 1;
            transform: scale(1);
        }

        .popover img {
            width: min(70%, 260px);
            height: auto;
            border-radius: 16px;
            box-shadow: 0 12px 26px rgba(255, 90, 138, 0.25);
        }
    </style>
</head>
<body>
    <main class="scene" id="scene">
        <div class="heart">💖</div>
        <h1>¿Quieres ser mi San Valentín?</h1>
        <div class="popover" id="yesPopover">
            <div>Siii, yo tambien queriaaa!!!</div>
            <img src="https://media.tenor.com/8CyZ_AnQIV4AAAAM/sami-en-dina-sami-dina.gif" alt="Gif de celebración" />
        </div>
        <div class="buttons" id="buttonArea">
            <button id="yesBtn" type="button">Sí</button>
            <button id="noBtn" onclick="moveNoButton()" type="button">No</button>
        </div>
    </main>

    <script>
        const scene = document.getElementById("scene");
        const buttonArea = document.getElementById("buttonArea");
        const noBtn = document.getElementById("noBtn");
        const yesBtn = document.getElementById("yesBtn");
        const yesPopover = document.getElementById("yesPopover");

        let yesScale = 1;
        const yesScaleStep = 0.08;
        let isAccepted = false;

        function growYesButton() {
            yesScale += yesScaleStep;
            yesBtn.style.setProperty("--yes-scale", yesScale.toFixed(2));
        }

        function moveNoButton(pointer) {
            if (isAccepted) {
                return;
            }
            const areaRect = buttonArea.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();

            const maxX = areaRect.width - btnRect.width;
            const maxY = areaRect.height - btnRect.height;

            const minDistance = Math.min(areaRect.width, areaRect.height) * 0.35;
            const safeDistance = Math.max(120, minDistance);

            const pointerX = pointer ? pointer.x - areaRect.left : null;
            const pointerY = pointer ? pointer.y - areaRect.top : null;

            let x = 0;
            let y = 0;
            let attempts = 0;

            while (attempts < 18) {
                x = Math.random() * Math.max(0, maxX);
                y = Math.random() * Math.max(0, maxY);

                if (!pointer) {
                    break;
                }

                const centerX = x + btnRect.width / 2;
                const centerY = y + btnRect.height / 2;
                const distance = Math.hypot(centerX - pointerX, centerY - pointerY);

                if (distance >= safeDistance) {
                    break;
                }

                attempts += 1;
            }

            noBtn.style.transform = `translate(${x}px, ${y}px)`;
            growYesButton();
        }

        function handleYesTouch() {
            if (isAccepted) {
                return;
            }
            yesBtn.classList.add("is-touched");
            setTimeout(() => yesBtn.classList.remove("is-touched"), 250);
            showPopover();
        }

        function showPopover() {
            if (isAccepted) {
                return;
            }
            isAccepted = true;
            yesBtn.disabled = true;
            noBtn.disabled = true;
            yesPopover.classList.add("show");
        }

        noBtn.addEventListener("mouseenter", (event) => {
            moveNoButton({ x: event.clientX, y: event.clientY });
        });
        noBtn.addEventListener("touchstart", (event) => {
            event.preventDefault();
            const touch = event.touches[0];
            if (touch) {
                moveNoButton({ x: touch.clientX, y: touch.clientY });
            } else {
                moveNoButton();
            }
        }, { passive: false });

        yesBtn.addEventListener("touchstart", handleYesTouch, { passive: true });
        yesBtn.addEventListener("click", showPopover);

        window.addEventListener("resize", () => {
            noBtn.style.transform = "translate(0, 0)";
        });
    </script>
</body>
</html>
